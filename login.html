<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevTeam — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <nav class="navbar">
    <div class="nav-logo"><a href="index.html" style="text-decoration:none;color:inherit">Dev<span>Team</span></a></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="login.html" class="nav-btn active">Login</a>
    <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
  </nav>

  <section class="login-section">
    <div class="login-left">
      <div class="hero-bg-circle c1"></div>
      <div class="hero-bg-circle c2"></div>
      <h2>Welcome<br>Back 👋</h2>
      <p>Log in to access your dashboard and collaborate with your team.</p>
    </div>

    <div class="login-right">
      <div class="login-card">
        <h3>Sign In</h3>
        <p class="login-sub">Enter your credentials below</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" required/>
            <span class="error-msg" id="emailError"></span>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required/>
            <span class="error-msg" id="passwordError"></span>
          </div>
          <div class="form-check">
            <input type="checkbox" id="remember"/>
            <label for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn-primary full-width">Sign In</button>
        </form>

        <div id="loginSuccess" class="success-msg" style="display:none">
          ✅ Login successful! Redirecting...
        </div>

        <p class="login-footer">Don't have an account? <a href="#">Sign up</a></p>
      </div>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
